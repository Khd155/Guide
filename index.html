<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الأنظمة - شركة قريش</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --bg: #0F0A07;
            --surface: #160D08;
            --gold: #C4956A;
            --text: #F0E8DF;
            --muted: #A8917E;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* خلفية جمالية */
        .glow {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(196,149,106,0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header img {
            width: 80px;
            margin-bottom: 15px;
        }

        .title {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
        }

        .title span { color: var(--gold); }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-top: 5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid rgba(196,149,106,0.2);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 10px 30px rgba(196,149,106,0.2);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #fff;
        }

        .card-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: rgba(168, 145, 126, 0.5);
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="header">
        <img src="report/hajj.png" alt="Logo"> <div class="title">بوابة <span>الأنظمة</span> الرقمية</div>
        <div class="subtitle">شركة قريش وأذان لخدمات حجاج الداخل المحدودة — موسم 1447هـ</div>
    </div>

    <div class="grid">
        <a href="report/index.html" class="card">
            <div class="card-icon">📋</div>
            <div class="card-title">نظام البلاغات</div>
            <div class="card-desc">دليل استخدام نظام بلاغات المخيمات للقسم الإداري والفني.</div>
        </a>

            <a href="hammam/index.html" class="card">
    <div class="card-icon">🎯</div>
    <div class="card-title">برنامج همام</div>
    <div class="card-desc">نظام ذكي لأتمتة المهام، متابعة الإنجاز، ودعم اتخاذ القرار عبر تقارير أداء دورية.</div>
</a>
        </div>

    <div class="footer">جميع الحقوق محفوظة © شركة قريش وأذان</div>

</body>
</html>
